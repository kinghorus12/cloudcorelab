heat_template_version: 2021-04-16

description: >
  CloudCoreLab full multi-tier private cloud stack.
  Deploys frontend + backend networks, security groups,
  web tier (x2, anti-affinity) and API tier with Cinder volume.
  Author: Horus Sielatshom

parameters:

  base_image:
    type: string
    description: Base image for all instances
    default: ccl-base

  web_flavor:
    type: string
    description: Flavor for web tier instances
    default: ccl.small

  api_flavor:
    type: string
    description: Flavor for API tier instance
    default: ccl.medium

  keypair_name:
    type: string
    description: SSH keypair for all instances
    default: ccl-deploy-key

  public_network:
    type: string
    description: External network for floating IPs
    default: ccl-public

  dns_server:
    type: string
    description: DNS server for tenant subnets
    default: 8.8.8.8

  frontend_cidr:
    type: string
    default: 10.20.1.0/24

  backend_cidr:
    type: string
    default: 10.20.2.0/24

resources:

  # ── Networks ────────────────────────────────────────────────────

  frontend_network:
    type: OS::Neutron::Net
    properties:
      name: stack-frontend-net

  frontend_subnet:
    type: OS::Neutron::Subnet
    properties:
      network: { get_resource: frontend_network }
      cidr: { get_param: frontend_cidr }
      gateway_ip: 10.20.1.1
      dns_nameservers: [{ get_param: dns_server }]
      enable_dhcp: true

  backend_network:
    type: OS::Neutron::Net
    properties:
      name: stack-backend-net

  backend_subnet:
    type: OS::Neutron::Subnet
    properties:
      network: { get_resource: backend_network }
      cidr: { get_param: backend_cidr }
      gateway_ip: 10.20.2.1
      dns_nameservers: [{ get_param: dns_server }]
      enable_dhcp: true

  # ── Router ──────────────────────────────────────────────────────

  core_router:
    type: OS::Neutron::Router
    properties:
      name: stack-core-router
      external_gateway_info:
        network: { get_param: public_network }

  frontend_iface:
    type: OS::Neutron::RouterInterface
    properties:
      router: { get_resource: core_router }
      subnet: { get_resource: frontend_subnet }

  backend_iface:
    type: OS::Neutron::RouterInterface
    properties:
      router: { get_resource: core_router }
      subnet: { get_resource: backend_subnet }

  # ── Security Groups ─────────────────────────────────────────────

  web_secgroup:
    type: OS::Neutron::SecurityGroup
    properties:
      name: stack-web-sg
      rules:
        - protocol: icmp
        - protocol: tcp
          port_range_min: 22
          port_range_max: 22
        - protocol: tcp
          port_range_min: 80
          port_range_max: 80
        - protocol: tcp
          port_range_min: 443
          port_range_max: 443

  api_secgroup:
    type: OS::Neutron::SecurityGroup
    properties:
      name: stack-api-sg
      rules:
        - protocol: tcp
          port_range_min: 8080
          port_range_max: 8080
          remote_ip_prefix: 10.20.1.0/24
        - protocol: tcp
          port_range_min: 22
          port_range_max: 22
          remote_ip_prefix: 10.20.1.0/24

  # ── Server Group (anti-affinity) ────────────────────────────────

  web_server_group:
    type: OS::Nova::ServerGroup
    properties:
      name: stack-web-group
      policies: [anti-affinity]

  # ── Compute ─────────────────────────────────────────────────────

  web_server_1:
    type: OS::Nova::Server
    properties:
      name: stack-web-01
      image: { get_param: base_image }
      flavor: { get_param: web_flavor }
      key_name: { get_param: keypair_name }
      networks:
        - network: { get_resource: frontend_network }
      security_groups:
        - { get_resource: web_secgroup }
      scheduler_hints:
        group: { get_resource: web_server_group }
      user_data: |
        #!/bin/bash
        apt-get update -y && apt-get install -y nginx
        systemctl enable nginx && systemctl start nginx
        echo "<h1>CloudCoreLab Stack Web-01</h1>" > /var/www/html/index.html

  web_server_2:
    type: OS::Nova::Server
    properties:
      name: stack-web-02
      image: { get_param: base_image }
      flavor: { get_param: web_flavor }
      key_name: { get_param: keypair_name }
      networks:
        - network: { get_resource: frontend_network }
      security_groups:
        - { get_resource: web_secgroup }
      scheduler_hints:
        group: { get_resource: web_server_group }
      user_data: |
        #!/bin/bash
        apt-get update -y && apt-get install -y nginx
        systemctl enable nginx && systemctl start nginx
        echo "<h1>CloudCoreLab Stack Web-02</h1>" > /var/www/html/index.html

  api_server:
    type: OS::Nova::Server
    properties:
      name: stack-api-01
      image: { get_param: base_image }
      flavor: { get_param: api_flavor }
      key_name: { get_param: keypair_name }
      networks:
        - network: { get_resource: backend_network }
      security_groups:
        - { get_resource: api_secgroup }

  # ── Floating IPs ────────────────────────────────────────────────

  web1_fip:
    type: OS::Neutron::FloatingIP
    depends_on: frontend_iface
    properties:
      floating_network: { get_param: public_network }
      port_id: { get_attr: [web_server_1, addresses, stack-frontend-net, 0, port] }

  web2_fip:
    type: OS::Neutron::FloatingIP
    depends_on: frontend_iface
    properties:
      floating_network: { get_param: public_network }
      port_id: { get_attr: [web_server_2, addresses, stack-frontend-net, 0, port] }

  # ── Storage ─────────────────────────────────────────────────────

  api_volume:
    type: OS::Cinder::Volume
    properties:
      name: stack-api-data
      size: 20

  api_volume_attach:
    type: OS::Cinder::VolumeAttachment
    properties:
      volume_id: { get_resource: api_volume }
      instance_uuid: { get_resource: api_server }

outputs:

  web1_public_ip:
    description: Web server 1 floating IP
    value: { get_attr: [web1_fip, floating_ip_address] }

  web2_public_ip:
    description: Web server 2 floating IP
    value: { get_attr: [web2_fip, floating_ip_address] }

  api_private_ip:
    description: API server private IP
    value: { get_attr: [api_server, first_address] }

  frontend_network_id:
    description: Frontend network ID
    value: { get_attr: [frontend_network, id] }

  stack_summary:
    description: Deployment summary
    value:
      str_replace:
        template: "web-01: W1 | web-02: W2 | api: API"
        params:
          W1:  { get_attr: [web1_fip, floating_ip_address] }
          W2:  { get_attr: [web2_fip, floating_ip_address] }
          API: { get_attr: [api_server, first_address] }
